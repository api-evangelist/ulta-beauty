  - type: Features
    data:
      - name: Online Store
        description: E-commerce platform for cosmetics, fragrance, skin care, and hair care products with loyalty program integration.
      - name: Salon Services
        description: In-store salon services including hair, skin, and brow services available for booking online.
      - name: Ulta Beauty Rewards
        description: Loyalty program with points earning on purchases, birthday rewards, and tiered membership benefits.
      - name: Affiliate Program
        description: Publisher and content creator affiliate program through Impact network with commission on qualifying sales.
      - name: Beauty Services
        description: Complimentary makeup services, skin consultations, and try-before-you-buy experiences in stores.
  - type: UseCases
    data:
      - name: Affiliate Marketing
        description: Publishers and content creators can earn commission by promoting Ulta Beauty products via the Impact affiliate program.
      - name: Creator Partnerships
        description: Social media creators on Instagram, YouTube, and TikTok can apply for the UB Creates Creator Program.
      - name: Brand Integration
        description: Beauty brands can partner with Ulta Beauty for retail distribution, exclusive launches, and brand events.
  - type: Solutions
    data:
      - name: Ulta Beauty Retail
        description: Physical retail stores offering the widest range of prestige and mass beauty products.
      - name: Ulta Beauty Online
        description: E-commerce platform at ulta.com with same-day delivery and buy online pick up in store.
      - name: Ulta Beauty Rewards
        description: Loyalty program with over 40 million members offering points, perks, and personalized offers.
      - name: Ulta Beauty Salon
        description: In-store salon services for hair, skin, and brows with online booking.
