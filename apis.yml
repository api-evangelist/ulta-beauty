aid: ulta-beauty
name: Ulta Beauty
description: >-
  Ulta Beauty is the largest beauty retailer in the United States, offering cosmetics,
  fragrance, skin care products, hair care products, and salon services through retail
  stores and online. The company operates over 1,400 stores across all 50 states and
  an e-commerce platform. Ulta Beauty does not currently offer a public developer API,
  but provides an affiliate program through Impact for publishers and content creators.
